apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:

      # Prometheus scraping itself
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]

      # ------------------------------------------------------------------
      # HOME NETWORK - update these IPs to match your actual devices
      # To find IPs: open your router admin page, usually http://192.168.1.1
      # or run `arp -a` in your terminal to see everything on the network
      # ------------------------------------------------------------------
      - job_name: "home-ping"
        metrics_path: /probe
        params:
          module: [icmp_ping]
        static_configs:
          - targets: ["10.0.0.1"]
            labels:
              device: "router"
          - targets: ["10.0.0.194"]
            labels:
              device: "laptop"
          - targets: ["10.0.0.219"]
            labels:
              device: "phone"
        relabel_configs:
          - source_labels: [__address__]
            target_label: __param_target
          - source_labels: [__param_target]
            target_label: instance
          - target_label: __address__
            replacement: blackbox-exporter:9115

      # HTTP check on your router's web UI
      # Most home routers are at http://192.168.1.1 - adjust if yours is different
      - job_name: "home-http"
        metrics_path: /probe
        params:
          module: [http_2xx]
        static_configs:
          - targets: ["http://10.0.0.1"]
            labels:
              device: "router-ui"
        relabel_configs:
          - source_labels: [__address__]
            target_label: __param_target
          - source_labels: [__param_target]
            target_label: instance
          - target_label: __address__
            replacement: blackbox-exporter:9115

      # Kubernetes pods with prometheus.io/scrape annotation
      - job_name: "kubernetes-pods"
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod

      # Kubernetes nodes - fixed for Kind using the API proxy
      - job_name: "kubernetes-nodes"
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/$1/proxy/metrics
